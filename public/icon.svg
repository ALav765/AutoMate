<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" rx="32" fill="#FBFAFE"/>

  <!-- checklist / planning card -->
  <rect x="38" y="50" width="90" height="110" rx="10" fill="#FFFFFF" stroke="#DCD3F0" stroke-width="3"/>

  <!-- checklist header bar -->
  <rect x="38" y="50" width="90" height="22" rx="10" fill="#5B4B8A"/>
  <rect x="38" y="62" width="90" height="10" fill="#5B4B8A"/>

  <!-- checklist rows: checkbox + line -->
  <g stroke="#8B7FC7" stroke-width="3" stroke-linecap="round">
    <path d="M52 92 l4 4 8 -9" fill="none"/>
    <line x1="72" y1="93" x2="112" y2="93"/>

    <path d="M52 114 l4 4 8 -9" fill="none"/>
    <line x1="72" y1="115" x2="112" y2="115"/>

    <rect x="48" y="129" width="13" height="13" rx="3" fill="none" stroke="#C7BEDF"/>
    <line x1="72" y1="137" x2="100" y2="137" stroke="#C7BEDF"/>
  </g>

  <!-- gear: automation, overlapping the card's bottom-right corner -->
  <g transform="translate(132,128)">
    <circle r="30" fill="#8B7FC7"/>
    <circle r="11" fill="#FBFAFE"/>
    <g fill="#8B7FC7">
      <rect x="-4" y="-38" width="8" height="14" rx="2"/>
      <rect x="-4" y="24" width="8" height="14" rx="2"/>
      <rect x="-38" y="-4" width="14" height="8" rx="2"/>
      <rect x="24" y="-4" width="14" height="8" rx="2"/>
      <rect x="-4" y="-38" width="8" height="14" rx="2" transform="rotate(45)"/>
      <rect x="-4" y="24" width="8" height="14" rx="2" transform="rotate(45)"/>
      <rect x="-38" y="-4" width="14" height="8" rx="2" transform="rotate(45)"/>
      <rect x="24" y="-4" width="14" height="8" rx="2" transform="rotate(45)"/>
    </g>
  </g>
</svg>
